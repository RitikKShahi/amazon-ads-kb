              - generic [ref=f2e88]: What happens to existing Sponsored Display campaigns?
              - img "open" [ref=f2e89]
            - paragraph [ref=f2e97]: Existing Sponsored Display campaigns will continue to run uninterrupted. You can access your existing Sponsored Display campaigns through Campaign Manager in the Ads Console.
          - generic [ref=f2e99]:
