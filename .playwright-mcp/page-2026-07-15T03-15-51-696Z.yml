              - generic [ref=f2e101]: What is the alternative to Sponsored Display?
              - img "open" [ref=f2e102]
            - paragraph [ref=f2e110]: The alternative to Sponsored Display is now display ads. To create new display campaigns, go to “Campaigns,” click “Create Campaign,” and then click “Display.”
