      - generic [ref=f3e59]:
        - heading "Why Amazon DSP?" [level=2] [ref=f3e61]
        - paragraph [ref=f3e63]: Amazon DSP stands out by prioritising both reach and privacy. It leverages unique first-party data and AI to deliver impactful ads even without traditional identifiers, ensuring your campaigns remain effective in a changing landscape. Additionally, its AI-powered automation streamlines campaign management and empowers advertisers with transparent reporting for data-driven decision-making. By combining privacy-centric clean rooms with streamlined workflows, Amazon DSP offers a comprehensive solution that unlocks deeper audience insights and optimises campaign performance.
      - generic [ref=f3e66]:
        - heading "What makes Amazon DSP different?" [level=2] [ref=f3e70]
        - generic [ref=f3e73]:
          - generic [ref=f3e75]:
            - img "icon of desktop and mobile devices" [ref=f3e78]
            - heading "Premium supply" [level=3] [ref=f3e80]
            - paragraph [ref=f3e82]: Reach relevant customers across the largest supply of premium, ad-supported content wherever they’re spending their time across Amazon-exclusive properties like Prime Video, or across third-party supply through our direct integrations with publishers and leading supply-side platforms.
          - generic [ref=f3e84]:
            - img "icon of three people" [ref=f3e87]
            - heading "Unique audience signals" [level=3] [ref=f3e89]
            - paragraph [ref=f3e91]: Gain a better understanding of your audience and the best strategy to reach them with our unique signals powered by our expansive browsing, shopping and streaming insights. Through our propriety approach to deterministic and modelled audiences, Amazon DSP helps advertisers reach qualified users without relying on traditional ad identifiers.
          - generic [ref=f3e93]:
            - img "icon for AI-powered optimisation" [ref=f3e96]
            - heading "AI-powered optimisation" [level=3] [ref=f3e98]
            - paragraph [ref=f3e100]: Maximise return on investment with our AI-powered solution by leveraging first- and third-party insights to automate tasks and target relevant audiences on Amazon and across third-party apps, sites and devices.
