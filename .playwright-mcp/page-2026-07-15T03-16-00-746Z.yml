          - generic [ref=f3e429]:
            - generic [ref=f3e430] [cursor=pointer]:
              - generic [ref=f3e431]: How can I get started?
              - img "open" [ref=f3e432]
            - generic [ref=f3e436]:
              - paragraph [ref=f3e438]: "We offer two options to get started: self-service and managed-service."
              - list [ref=f3e440]:
                - listitem [ref=f3e441]:
                  - text: Self-service customers are in full control of their campaigns. Start by either
                  - link [ref=f3e442] [cursor=pointer]:
                    - /url: https://advertising.amazon.com/register?ref_=a20m_us_p_dsp_faq_rgstr
                    - strong [ref=f3e444]: creating a new account
                  - text: or
                  - link [ref=f3e445] [cursor=pointer]:
                    - /url: https://advertising.amazon.com/sign-in?ref_=a20m_us_p_dsp_faq_sgn
                    - strong [ref=f3e447]: sign in
                  - text: if you’re an existing user.
                - listitem [ref=f3e448]:
                  - text: The managed-service option is designed for advertisers that want access to Amazon DSP inventory, with consultative service or for those with limited programmatic advertising experience. The managed-service option typically requires a minimum spend of USD $50,000 (minimum may vary per country).
                  - link [ref=f3e449] [cursor=pointer]:
                    - /url: https://advertising.amazon.com/contact-sales?ref_=a20m_us_p_dsp_faq_cntct
                    - strong [ref=f3e451]: Contact an Amazon Ads account executive
                  - text: for more information.
          - generic [ref=f3e453]:
            - generic [ref=f3e454] [cursor=pointer]:
              - generic [ref=f3e455]: I don’t sell on Amazon. Can I still use Amazon DSP?
              - img "open" [ref=f3e456]
            - paragraph [ref=f3e462]: Yes, you can use Amazon DSP even if you don’t sell on Amazon. Amazon DSP is designed to help advertisers reach audiences both on Amazon and beyond. It offers advanced targeting capabilities using Amazon’s rich first-party signals, enabling you to reach specific demographics, behaviours, contextually relevant products and categories, keywords and interests across the web. This means you can place ads on Amazon-owned properties like Prime Video, IMDb and Twitch, and across a wide range of premium third-party publishers.Whether your goal is to drive brand awareness, consideration or conversion, Amazon DSP provides the tools and insights needed to effectively reach relevant audiences and achieve your advertising objectives.
          - generic [ref=f3e464]:
            - generic [ref=f3e465] [cursor=pointer]:
              - generic [ref=f3e466]: What types of audience targeting capabilities are offered through Amazon DSP?
              - img "open" [ref=f3e467]
            - paragraph [ref=f3e473]:
              - text: "Amazon DSP offers audience targeting in three main categories: 1)"
              - link "Amazon Audiences" [ref=f3e474] [cursor=pointer]:
                - /url: https://advertising.amazon.com/insights-and-planning/audiences?ref_=a20m_us_p_dsp_faq_p_ip_aud
              - text: ", based on first-party buying, browsing and streaming signals; 2) advertiser audiences, driven by custom inputs like product relevance and remarketing; 3) third-party audiences, sourced from broader internet activities, such as car purchases or cable subscriptions, to name a few."
          - generic [ref=f3e476]:
            - generic [ref=f3e477] [cursor=pointer]:
              - generic [ref=f3e478]: How does Amazon DSP approach addressability in advertising campaigns?
              - img "open" [ref=f3e479]
            - paragraph [ref=f3e485]:
              - text: Over the past two years, Amazon Ads has been innovating to reduce reliance on less durable signals.
              - link "Ad Relevance" [ref=f3e486] [cursor=pointer]:
                - /url: https://advertising.amazon.com/blog/vision-future-of-addressability-and-advertising-technology?ref_=a20m_us_p_dsp_faq_blg_addrssblty
              - text: "marks a shift in how we deliver relevant ads, using more signals and the latest in AWS-powered AI. Instead of replacing third-party cookies with another signal, Ad Relevance introduces innovations across three areas: leveraging AI-powered targeting strategies to enhance relevancy; collaborating with industry leaders to improve consumer reach across all supply; and investing in our measurement products to ensure they are more durable and customer-centric, with a focus on holistic cross-channel impact."
          - generic [ref=f3e488]:
            - generic [ref=f3e489] [cursor=pointer]:
              - generic [ref=f3e490]: How can Amazon DSP help design my media planning to align with specific objectives?
              - img "open" [ref=f3e491]
            - paragraph [ref=f3e497]:
              - text: Amazon DSP provides an integrated
              - link "media planning suite" [ref=f3e498] [cursor=pointer]:
                - /url: https://advertising.amazon.com/insights-and-planning/media-planning?ref_=a20m_us_p_dsp_faq_p_ip_mp
              - text: with tools like cross-channel planner and channel planner that help optimally allocate media across Amazon DSP supply and simulate reach and budget in real-time based on live inventory by linear TV vs. streaming TV vs. audio. Once campaign success is measured, we integrate the insights in the next cycle of campaign planning.
          - generic [ref=f3e500]:
            - generic [ref=f3e501] [cursor=pointer]:
              - generic [ref=f3e502]: What programmatic media buying options are available?
              - img "open" [ref=f3e503]
            - paragraph [ref=f3e509]:
              - text: Amazon DSP offers
              - link "real-time bidding (RTB)" [ref=f3e510] [cursor=pointer]:
                - /url: https://advertising.amazon.com/library/guides/real-time-bidding?ref_=a20m_us_p_dsp_faq_lbr_gd_rtb
              - text: ", private marketplaces (PMP), private auction and programmatic guaranteed buying, along with a variety of deals-based options. For easier inventory discovery,"
              - link "inventory hub" [ref=f3e511] [cursor=pointer]:
                - /url: https://advertising.amazon.com/resources/whats-new/improve-entire-lifecycle-of-deals-with-inventory-hub?ref_=a20m_us_p_dsp_faq_rs_wn_invhub
              - text: centralises all deals across Amazon properties and third-party inventory, allowing advertisers to more easily discover, manage and analyse the right opportunities to meet campaign objectives.
          - generic [ref=f3e513]:
            - generic [ref=f3e514] [cursor=pointer]:
