          - heading "Amazon DSP" [level=1] [ref=f3e45]
          - paragraph [ref=f3e47]: Delivering results through relevancy at scale, Amazon DSP is an omnichannel marketing solution that provides choice and flexibility to drive meaningful moments between brands and consumers.
