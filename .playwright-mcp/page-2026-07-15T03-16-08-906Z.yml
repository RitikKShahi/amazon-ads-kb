        - generic [ref=f4e98]:
          - paragraph [ref=f4e103]:
            - text: Looking to attract more shoppers and re-engage existing customers?
            - link "Display ads" [ref=f4e104] [cursor=pointer]:
              - /url: https://advertising.amazon.com/products/display-ads?ref_=a20m_us_lbr_gd_dagd_p_da
            - text: help you reach more of your ideal buyers and drive performance across the entire buying journey, from awareness to purchase and repurchase.In this guide, you’ll learn why and how to use display ads to help multiply your reach, no matter your budget.
          - generic [ref=f4e106]:
            - heading "What are display ads, and how does it benefit your business?" [level=2] [ref=f4e109]
            - paragraph [ref=f4e114]:
              - text: If you’re a vendor or professional seller enrolled in
              - link "Amazon Brand Registry" [ref=f4e115] [cursor=pointer]:
                - /url: https://sell.amazon.com/brand-registry?ref_=a20m_us_lbr_gd_dagd_br
              - text: ", display ads can help showcase your products to relevant audiences wherever they spend their time in Amazon-owned and partner networks—whether they’re browsing in the Amazon store, gaming on"
              - link "Twitch" [ref=f4e116] [cursor=pointer]:
                - /url: https://advertising.amazon.com/library/guides/twitch-ads?ref_=a20m_us_lbr_gd_dagd_gd_ta
              - text: ", streaming videos on Prime, and more. Display ads make it easier for shoppers to discover your product for the first time, or consider repurchasing your product.In just a few clicks, display ads can help you:"
            - list [ref=f4e118]:
              - listitem [ref=f4e119]: Reach new audiences to generate awareness for specific products.
              - listitem [ref=f4e120]: Increase visibility across your entire catalog.
              - listitem [ref=f4e121]: Drive sales of your best-performing items on Amazon.
              - listitem [ref=f4e122]: Accelerate sell-through of products with higher prices or longer sales cycles.
              - listitem [ref=f4e123]: Promote clearance and seasonal products.
              - listitem [ref=f4e124]:
                - text: Boost your reach during popular
                - link "shopping events" [ref=f4e125] [cursor=pointer]:
                  - /url: https://advertising.amazon.com/library/guides/global-shopping-events?ref_=a20m_us_lbr_gd_dagd_gd_gblshpg
                - text: by cross-selling complementary products in your own pages.
            - paragraph [ref=f4e127]: "Display ads are currently available in the following countries: United States, Canada, France, Germany, Italy, Spain, United Kingdom, India, Japan, United Arab Emirates, India, Netherlands, Australia, Mexico, and Brazil."
          - generic [ref=f4e131]:
            - heading "What do display ads look like?" [level=2] [ref=f4e134]
            - paragraph [ref=f4e139]:
              - text: A display ad is a type of digital ad format that uses visual elements like images, graphics, animations, or video (also referred to as OLV) to promote a product, service, or brand on websites, apps, or social media platforms. Unlike search-based ads, display ads use audience-based behavioral targeting, not
              - link "keywords" [ref=f4e140] [cursor=pointer]:
                - /url: https://advertising.amazon.com/library/guides/keyword-targeting?ref_=a20m_us_lbr_gd_dagd_gd_kwrd
              - text: ", to find the right users. At Amazon, display ads aspire to be visually appealing, cost-effective, and provide a measurable way for brands to reach their marketing goals through leveraging Amazon's"
              - superscript [ref=f4e141]: "1"
              - text: P signals to help them meet the right audiences at the right time.You can choose between an automated or custom image—both are
              - link "dynamically optimized" [ref=f4e142] [cursor=pointer]:
                - /url: https://advertising.amazon.com/library/guides/dco-dynamic-creative-optimization?ref_=a20m_us_lbr_gd_dagd_gd_dco
              - text: in our self-service platform. This means that if you add multiple products to your campaign, the creative elements that have the highest chance of conversion will be served in your ads automatically. If you make changes to the
              - link "product detail page" [ref=f4e143] [cursor=pointer]:
                - /url: https://advertising.amazon.com/library/guides/improve-your-products-for-advertising?ref_=a20m_us_lbr_gd_dagd_gd_iypad
              - text: of your featured product, the retail-centric elements of your ad creative will be refreshed automatically.
            - img "Display ads" [ref=f4e146]
            - paragraph [ref=f4e150]:
              - emphasis [ref=f4e151]: Display ads
            - img "Display ads" [ref=f4e156]
            - paragraph [ref=f4e160]:
              - emphasis [ref=f4e161]: Display ads
            - paragraph [ref=f4e165]:
              - text: Display ads may appear anywhere customers spend their time on Amazon-owned websites, like the Amazon store, and Twitch, plus a variety of third-party websites and apps. Your ad’s exact placement depends largely on your targeting strategy, contextual or audience targeting. For instance, if your ad is using product targeting, your ads may appear on product detail pages, alongside customer reviews, shopping results pages, or under the
              - link "featured offer" [ref=f4e166] [cursor=pointer]:
                - /url: https://sell.amazon.com/blog/buy-box-featured-offer?ref_=a20m_us_lbr_gd_dagd_bbfo
              - text: .
              - emphasis [ref=f4e167]:
                - strong [ref=f4e168]: 275M+ shoppers
                - text: Average monthly ad-supported reach of Amazon Adsexclusive owned-and-operated inventory in the U.S.
                - superscript [ref=f4e169]: "2"
          - generic [ref=f4e173]:
            - heading "How display ads pricing works" [level=2] [ref=f4e176]
            - paragraph [ref=f4e181]: "Display ads have no minimum spend requirements, so you can set any budget that works for you. There are two cost types available to you:"
            - list [ref=f4e183]:
              - listitem [ref=f4e184]:
                - link "Cost per click (CPC)" [ref=f4e185] [cursor=pointer]:
                  - /url: https://advertising.amazon.com/library/guides/cost-per-click?ref_=a20m_us_lbr_gd_dagd_gd_cpc
                - text: ", which means you’re charged each time someone clicks on your ad. Your final CPC will be based on your adjusted bid plus additional factors."
              - listitem [ref=f4e186]:
                - link "Cost per thousand (vCPM)" [ref=f4e187] [cursor=pointer]:
                  - /url: https://advertising.amazon.com/library/guides/cost-per-mille?ref_=a20m_us_lbr_gd_dagd_gd_cpm
                - text: ", which means you’re charged for every 1,000"
                - link "viewable impressions" [ref=f4e188] [cursor=pointer]:
                  - /url: https://advertising.amazon.com/library/guides/viewability?ref_=a20m_us_lbr_gd_dagd_gd_vwblty
                - text: of your ad. Your final vCPM will be based on your adjusted bid plus additional factors.
            - paragraph [ref=f4e190]: You can update your budget at any time, as your needs change. (We’ll cover your campaign budget and bidding in greater detail below.)
          - generic [ref=f4e194]:
            - heading "How to get started with display ads" [level=2] [ref=f4e197]
            - paragraph [ref=f4e202]: Display ads are easy to create and manage, and accessible to businesses and budgets of all sizes.
            - heading "First, sign into the Amazon Ads console." [level=3] [ref=f4e206]
            - paragraph [ref=f4e208]:
              - emphasis [ref=f4e209]: "If you’re new to Amazon Ads:"
              - text: Go to
              - link "advertising.amazon.com" [ref=f4e210] [cursor=pointer]:
                - /url: https://advertising.amazon.com/?ref_=a20m_us_lbr_gd_dagd_amznad
              - text: ", select “"
              - link "Register" [ref=f4e211] [cursor=pointer]:
                - /url: https://advertising.amazon.com/register?ref_=a20m_us_lbr_gd_dagd_rgstr
              - text: ",” then choose one of the account options to sign in."
              - emphasis [ref=f4e212]: "If you have an existing advertising account:"
              - text: Sign into
              - link "advertising.amazon.com" [ref=f4e213] [cursor=pointer]:
                - /url: https://advertising.amazon.com/?ref_=a20m_us_lbr_gd_dagd_amznad
              - text: and select the display ads campaign type.(You may be asked to link to Vendor Central account if you haven’t done that yet.)
            - heading "Create a campaign." [level=3] [ref=f4e217]
            - paragraph [ref=f4e219]: From the “Campaign manager” option on your left-hand side menu, choose “display ads” as your campaign type.
            - heading "Give your campaign a name." [level=3] [ref=f4e223]
            - paragraph [ref=f4e225]: Keep your campaign name straightforward, so you can find it easily later. This name is only visible to you.
            - heading "Choose your campaign duration." [level=3] [ref=f4e229]
            - paragraph [ref=f4e231]: We recommend running your campaign without an end date to avoid cutting your results short. It can take 7–14 days for product sales to be attributed to a click or view on your ad, so it’s important to let your campaign run for a few weeks to see results. You can pause or restart a campaign at any time.
            - heading "Set your budget." [level=3] [ref=f4e235]
            - paragraph [ref=f4e237]: There’s no minimum advertising spend requirement, and you can change your daily budgetat any time. Your daily budget is the amount you’re willing to spend per day, over a calendar month. Your spend on any given day may exceed your daily budget, but the average daily spend at the end of the month won’t exceed your daily budget. For small to medium-sized businesses, we recommend a daily budget of $40–$60 (or your currency equivalent). We also advise adjusting your budget based on your campaign performance.
            - heading "Select your bid optimization strategy." [level=3] [ref=f4e241]
            - paragraph [ref=f4e243]: "You can choose your pricing structure based on a CPC (cost per click) or vCPM (cost per thousand impressions) model. Choose your bid based on the maximum amount you’re willing to pay when shoppers click or view your ad. Start with the $1 default bid for CPC campaigns and $5 default bid for vCPM campaigns, then adjust based on your ads performance. Decide whether to enable cost controls.Display ads give you three bid optimization options:"
            - list [ref=f4e245]:
              - listitem [ref=f4e246]:
                - strong [ref=f4e247]: "Optimize for viewable impressions:"
                - text: This strategy optimizes your bids to help increase views of your ad. These campaigns are more likely to have higher viewable impressions and lower click-through rates, compared to other bid optimizations.
              - listitem [ref=f4e248]:
                - strong [ref=f4e249]: "Optimize for page visits:"
                - text: This strategy may help to drive product consideration by showing your ads to shoppers who are more likely to click on your ad. Your bids will be optimized for higher click-through rates.
              - listitem [ref=f4e250]:
                - strong [ref=f4e251]: "Optimize for conversions:"
                - text: This strategy may help you drive new and repeat sales by showing your ad to shoppers more likely to purchase your product. As your bids are optimized for conversions, you may see fewer clicks for your ads than when you optimize for page visits. We recommend using this option on your first campaign.
            - heading "Give your ad group a name." [level=3] [ref=f4e255]
            - paragraph [ref=f4e257]: Ad groups are a way to organize ads within your advertising campaign. Products placed together in an ad group share the same bids and targets. We recommend using a name that’s clear and easy to find for later reference.
            - heading "Choose your ad format." [level=3] [ref=f4e261]
            - paragraph [ref=f4e263]:
              - text: Display ads allow you to pick between image and
              - link "video ad" [ref=f4e264] [cursor=pointer]:
                - /url: https://advertising.amazon.com/solutions/products/video-ads?ref_=a20m_us_lbr_gd_dagd_p_va
              - text: formats to best showcase your products, and tell a captivating story to customer. Learn more about video ads
              - link "here" [ref=f4e265] [cursor=pointer]:
                - /url: https://advertising.amazon.com/resources/library?ref_=a20m_us_lbr_gd_dagd_resroc
              - text: . If you’d like to support creating your video, the
              - link "Amazon Ads Partner Directory" [ref=f4e266] [cursor=pointer]:
                - /url: https://advertising.amazon.com/partners/directory?ref_=a20m_us_lbr_gd_dagd_prtdrct
              - text: is a great place to look. Our certified service providers can produce high-quality, policy compliant and impactful videos for your ads.
            - heading "Pick the products you want to advertise." [level=3] [ref=f4e270]
            - paragraph [ref=f4e272]:
              - text: We recommend adding at least 10 well-performing products to your campaign. This way, your campaigns have enough options to serve relevant ads for a single impression, plus allow multiple ads from your brand to appear on a single detail page. On average, advertisers who promoted 10 or more products saw an increase of 13% in sales over a 30 day period compared to advertisers who didn’t.
              - superscript [ref=f4e273]: "3"
              - text: "We recommend choosing products that:"
            - list [ref=f4e275]:
              - listitem [ref=f4e276]: Fall within the same category
              - listitem [ref=f4e277]: Are closely related
              - listitem [ref=f4e278]: Have a similar price point
              - listitem [ref=f4e279]: Have positive customer reviews
              - listitem [ref=f4e280]: Featured four or more high-quality, zoomable images
              - listitem [ref=f4e281]: Include at least three bullet points describing your key product differentiators
            - paragraph [ref=f4e283]: Note that display ads will automatically stop serving if your products are no longer available to purchase. You may still add products to a campaign, even if they have low inventory, or are out of stock. You won’t be charged for ads that aren’t served due to product unavailability.
            - heading "Select your targeting type." [level=3] [ref=f4e287]
            - paragraph [ref=f4e289]:
              - text: "Targeting helps you refine the criteria for the types of shoppers you want to reach — those who most closely mirror your ideal customer, and who are most likely to buy from you. You can select between two targeting tactics:"
              - strong [ref=f4e290]:
                - emphasis [ref=f4e291]: "Contextual Targeting:"
              - text: Target specific products, or relevant product categories, in the Amazon store to help shoppers find your products. You can refine your contextual targeting using elements such as price, brand, and Prime-shipping eligibility.
              - strong [ref=f4e292]:
                - emphasis [ref=f4e293]: Where do these ads appear?
              - link "Contextual targeting ads" [ref=f4e294] [cursor=pointer]:
                - /url: https://advertising.amazon.com/library/guides/contextual-advertising?ref_=a20m_us_lbr_gd_dagd_cntxtladv
              - text: are served in the Amazon store in placements including product detail pages, alongside customer reviews, and on shopping results pages.
              - strong [ref=f4e295]:
                - emphasis [ref=f4e296]: "Audience targeting:"
              - text: Using display ads audiences helps you reach shoppers based on their interests that are related to your products and brand, both in the Amazon store and third-party destinations. You can re-engage customers that have previously viewed or purchased your products, or similar products, in the Amazon store. This tactic can be used to help drive visibility during new product, or
              - link "brand launches" [ref=f4e297] [cursor=pointer]:
                - /url: https://advertising.amazon.com/library/guides/brand-launch?ref_=a20m_us_lbr_gd_dagd_gd_bndlch
              - text: . You can also use display ads audience segments, leveraging first-party insights, to help reach shoppers in four categories; interests, life events, lifestyle, or in-market.
              - strong [ref=f4e298]:
                - emphasis [ref=f4e299]: "Amazon audiences:"
              - text: Use thousands of pre-built audience segments to help you reach new prospective shoppers at the awareness and consideration stage of the shopping journey. Amazon audiences are based on four main categories that are built and curated by Amazon Ads using various first-party shopping, streaming, and entertainment insights.
              - strong [ref=f4e300]:
                - emphasis [ref=f4e301]: "Views remarketing:"
              - text: Help re-engage audiences based on those who have viewed your products, or similar products in the Amazon store, but haven’t made a purchase. Views
              - link "remarketing" [ref=f4e302] [cursor=pointer]:
                - /url: https://advertising.amazon.com/library/guides/remarketing?ref_=a20m_us_lbr_gd_dagd_gd_remrktg
              - text: helps you reach audiences at various stages in their shopping journey and inspire them to make a purchase.
              - strong [ref=f4e303]:
                - emphasis [ref=f4e304]: "Purchases remarketing:"
              - text: Help re-engage audiences who have purchased your products, or complementary products in the Amazon store. Purchases remarketing can help you drive repeat purchases, build
              - link "customer loyalty" [ref=f4e305] [cursor=pointer]:
                - /url: https://advertising.amazon.com/objectives/customer-loyalty?ref_=a20m_us_lbr_gd_dagd_obj_lylty
              - text: ", and cross-sell to existing customers based on historical purchase behavior."
              - strong [ref=f4e306]:
                - emphasis [ref=f4e307]: Where do these ads appear?
              - emphasis [ref=f4e308]: Display ads
              - link "audiences" [ref=f4e309] [cursor=pointer]:
                - /url: https://advertising.amazon.com/insights-and-planning/audiences?ref_=a20m_us_lbr_gd_dagd_ip_aud
              - text: appear both in the Amazon store, and on third-party destinations. In the Amazon store, placements appear in prominent positions such as the homepage and product detail pages. Outside of the Amazon store, placements appear on Twitch or third-party apps and websites.Combine contextual targeting and display ads audiences for the best results. Used together, both contextual targeting and display ads audiences can help you reach and engage relevant shoppers. You can use contextual targeting to help generate product detail page traffic and then use views remarketing within display ads audiences to re-engage customers to help secure missed sales.
            - heading "Launch your campaign." [level=3] [ref=f4e313]
            - paragraph [ref=f4e315]: Display ads automatically generate your ads, featuring a product image, title, star rating, Prime badging, and price from your product’s detail page. Your ads will automatically update if the information on your detail page is changed. If you’d like to highlight your brand and unique selling points, consider tailoring your ads with a custom brand logo, headline, and lifestyle image. Your ads can also display deals and savings badges to inform shoppers when your advertised product is under promotion, including deal type (e.g., deal of the day, lightning deal, best deal), discounted with coupons, or Subscribe & Save.
          - generic [ref=f4e319]:
            - heading "Managing your campaign" [level=2] [ref=f4e322]
            - paragraph [ref=f4e327]: "Monitoring your campaign performance lets you know what’s working, so you can adjust your tactics and improve your campaigns regularly.Campaign metrics for display ads include:"
            - list [ref=f4e329]:
              - listitem [ref=f4e330]: Impressions
              - listitem [ref=f4e331]: Spend
              - listitem [ref=f4e332]: Clicks
              - listitem [ref=f4e333]: Cost per click (CPC)
              - listitem [ref=f4e334]: Cost per thousand viewable impressions (vCPM)
              - listitem [ref=f4e335]: Click-through rate (CTR)
              - listitem [ref=f4e336]: Sales
              - listitem [ref=f4e337]:
                - link "Advertising cost of sales (ACOS)" [ref=f4e338] [cursor=pointer]:
                  - /url: https://advertising.amazon.com/library/guides/acos-advertising-cost-of-sales?ref_=a20m_us_lbr_gd_dagd_gd_acos
              - listitem [ref=f4e339]:
                - link "Return on ad spend (ROAS)" [ref=f4e340] [cursor=pointer]:
                  - /url: https://advertising.amazon.com/library/guides/return-on-ad-spend-roas?ref_=a20m_us_lbr_gd_dagd_gd_roas
              - listitem [ref=f4e341]: New-to-brand (NTB)
            - paragraph [ref=f4e343]:
              - text: After launching your campaign, we recommend waiting at least two weeks so you have sufficient data insights to assess your campaign performance. Once you have enough campaign metrics, review them weekly to make informed decisions on improving results.
              - strong [ref=f4e344]:
                - emphasis [ref=f4e345]: "Downloadable reports:"
              - text: You can also learn how your campaigns are performing by accessing downloadable reports.
              - strong [ref=f4e346]:
                - emphasis [ref=f4e347]: "Purchased product report:"
              - text: This report provides details on your non-advertised products that were purchased by shoppers after they clicked on your display ads. It helps you identify new products you might consider advertising, cross-selling contextual targeting opportunities, and understand shopping behaviors.
              - strong [ref=f4e348]:
                - emphasis [ref=f4e349]: "Targeting report:"
              - text: Targeting reports provide performance metrics for your targeted audiences. Use these reports to see how targeted products or audiences impact your campaign over time.
              - strong [ref=f4e350]:
                - emphasis [ref=f4e351]: "Advertised product report:"
              - text: These reports provide insight into sales and performance metrics for advertised products in all campaigns that received at least one impression. You can use this report to analyze the performance of individual products.
              - strong [ref=f4e352]:
                - emphasis [ref=f4e353]: "Campaign report:"
              - text: This report details your display ads performance, aggregated by campaign.
          - generic [ref=f4e359]:
            - heading "5 ways to boost your campaign performance" [level=2] [ref=f4e362]
            - paragraph [ref=f4e367]: You can help improve your advertising results by experimenting with the following practices.
            - list [ref=f4e369]:
              - listitem [ref=f4e370]:
                - strong [ref=f4e371]: Add more than 10 ASINs (individual products) in your display ads campaigns.
                - text: When you advertise more products, the products in your campaign can participate in more auctions, meaning your ads are more likely to appear on Amazon. Additionally, your ads can be relevant to a wider range of customers because a larger portion of your catalog is available when display ads dynamically selects a product to advertise.
              - listitem [ref=f4e372]:
                - strong [ref=f4e373]: Ensure your campaign has enough budget to stay live throughout the day.
                - text: Campaigns that frequently run out of daily budget may be missing out on potential impressions. Consider increasing those budgets to continuously drive shoppers to your ads. If you can’t increase your daily budget, consider reducing your bids.
              - listitem [ref=f4e374]:
                - strong [ref=f4e375]: Experiment with your campaign targets.
                - text: Remember that your targeting settings can have a big impact on results! If a category is underperforming, don’t just reduce its bid. Rather, refine its targeting and add narrower, more relevant targets to the campaign.
              - listitem [ref=f4e376]:
                - strong [ref=f4e377]: Consider the sales of non-advertised products.
                - text: If you see your ads are generating sales for non-advertised products, consider advertising those products. You might also consider targeting those products with complementary products.
              - listitem [ref=f4e378]:
                - strong [ref=f4e379]: Leverage high-performing audience segments.
                - text: If you see strong performance in a specific audience segment, try targeting similar segments, or create a parallel campaign for that segment using a different targeting tactic.
          - generic [ref=f4e383]:
            - heading "Combine advertising solutions to magnify your reach and impact" [level=2] [ref=f4e386]
            - paragraph [ref=f4e391]:
              - text: Mixing and matching different
              - link "Amazon Ads" [ref=f4e392] [cursor=pointer]:
                - /url: https://advertising.amazon.com/products?ref_=a20m_us_lbr_gd_dagd_p_all
              - text: solutions can help you reach more shoppers at various stages of the buying journey. For example, display ads can complement
              - link "Sponsored Brands" [ref=f4e393] [cursor=pointer]:
