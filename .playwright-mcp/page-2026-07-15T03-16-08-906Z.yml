              - text: ads, augmenting your visibility with added targeting options. Imagine, for example, that a shopper sees your Sponsored Brands ad showcasing a jacket. They’re intrigued but not ready to buy. Later, while browsing another website, they see a display ad reminding them of your jacket. That extra nudge might tip them over the edge and lead to a purchase. While Sponsored Brands piques shoppers’ interest, display ads can drive consideration and sway buying decisions.
