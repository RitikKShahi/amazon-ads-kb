          - generic [ref=f5e72]:
            - generic [ref=f5e73] [cursor=pointer]:
              - generic [ref=f5e74]: What happened to Sponsored Display?
              - img "open" [ref=f5e75]
            - paragraph [ref=f5e83]:
              - text: Sponsored Display is now a part of Amazon's wider display ads offering within our new centralized hub that unifies access to all Amazon Ads products, bringing together sponsored ads and
              - link "Amazon DSP" [ref=f5e84] [cursor=pointer]:
                - /url: https://advertising.amazon.com/solutions/products/amazon-dsp?ref_=a20m_us_p_sd_faq_p_tech_dsp
              - text: workflows into a single workspace. This new direction delivers the simplicity you want while preserving all the powerful advertising features you've come to rely on.
          - generic [ref=f5e86]:
            - generic [ref=f5e87] [cursor=pointer]:
              - generic [ref=f5e88]: What happens to existing Sponsored Display campaigns?
              - img "open" [ref=f5e89]
            - paragraph [ref=f5e97]: Existing Sponsored Display campaigns will continue to run uninterrupted. You can access your existing Sponsored Display campaigns through Campaign Manager in the Ads Console.
          - generic [ref=f5e99]:
            - generic [ref=f5e100] [cursor=pointer]:
              - generic [ref=f5e101]: What is the alternative to Sponsored Display?
              - img "open" [ref=f5e102]
            - paragraph [ref=f5e110]: The alternative to Sponsored Display is now display ads. To create new display campaigns, go to “Campaigns,” click “Create Campaign,” and then click “Display.”
          - generic [ref=f5e112]:
            - generic [ref=f5e113] [cursor=pointer]:
              - generic [ref=f5e114]: What is display advertising?
              - img "open" [ref=f5e115]
            - paragraph [ref=f5e123]:
              - text: Display ads are flexible ad formats that can help your brand reach relevant audiences wherever they spend time using Amazon-generated creative or your own creative assets.
